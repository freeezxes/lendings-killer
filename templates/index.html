<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Создать сайт — lendings.kz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;
    --accent:#7c5cff;--accent-glow:#7c5cff33;--text:#f0eeff;--muted:#6b6b8a;
    --green:#34d896;
  }
  html,body{height:100%;font-family:'Sora',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

  /* Top bar */
  .top-bar{
    padding:13px 18px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    background:#0a0a0fee;backdrop-filter:blur(12px);
    position:sticky;top:0;z-index:10;
  }
  .logo{font-size:.93rem;font-weight:700;}.logo span{color:var(--accent);}
  .top-right{display:flex;align-items:center;gap:10px;}
  .token-badge{
    display:inline-flex;align-items:center;gap:5px;
    background:var(--accent-glow);border:1px solid #7c5cff44;
    color:var(--accent);border-radius:20px;
    padding:4px 10px;font-size:.74rem;font-weight:600;
  }
  .back-link{color:var(--muted);text-decoration:none;font-size:.78rem;
    display:flex;align-items:center;gap:4px;transition:color .2s;}
  .back-link:hover{color:var(--text);}

  /* Chat layout */
  .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 54px);}
  .chat-area{flex:1;overflow-y:auto;padding:18px 18px 4px;display:flex;flex-direction:column;gap:10px;
    scroll-behavior:smooth;}

  /* Messages */
  .msg{max-width:80%;padding:11px 15px;border-radius:18px;line-height:1.6;font-size:.88rem;white-space:pre-wrap;word-break:break-word;}
  .msg.bot{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;color:#ddd;align-self:flex-start;}
  .msg.user{background:var(--accent);border-bottom-right-radius:4px;color:#fff;align-self:flex-end;}

  /* Photos row */
  .photos-row{display:flex;flex-wrap:wrap;gap:6px;align-self:flex-start;max-width:80%;margin-top:2px;}
  .photo-thumb{width:68px;height:68px;border-radius:10px;object-fit:cover;border:2px solid #333;}
  .photo-uploading{width:68px;height:68px;border-radius:10px;background:#1a1a2a;border:2px dashed #333;
    display:flex;align-items:center;justify-content:center;}

  /* Typing indicator */
  .typing{display:flex;gap:5px;padding:12px 15px;background:var(--surface);border:1px solid var(--border);
    border-radius:18px;border-bottom-left-radius:4px;width:52px;align-self:flex-start;}
  .typing span{width:6px;height:6px;background:#444;border-radius:50%;animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  /* Done card */
  .done-card{
    background:linear-gradient(135deg,#1a1430,#12111c);
    border:1px solid #7c5cff44;border-radius:18px;
    padding:20px;align-self:flex-start;max-width:300px;
  }
  .done-title{font-size:.9rem;font-weight:600;margin-bottom:4px;}
  .done-sub{font-size:.76rem;color:var(--muted);margin-bottom:14px;line-height:1.5;}
  .done-actions{display:flex;flex-direction:column;gap:8px;}
  .btn-open{display:flex;align-items:center;justify-content:center;gap:6px;
    background:var(--accent);color:#fff;border:none;border-radius:10px;
    padding:11px 16px;font-family:inherit;font-size:.84rem;font-weight:600;
    cursor:pointer;text-decoration:none;transition:opacity .15s;}
  .btn-open:hover{opacity:.9;}
  .btn-dash{display:flex;align-items:center;justify-content:center;gap:6px;
    background:#1e1e2e;color:var(--muted);border:1px solid var(--border);
    border-radius:10px;padding:11px 16px;font-family:inherit;font-size:.84rem;
    cursor:pointer;text-decoration:none;transition:all .15s;}
  .btn-dash:hover{color:var(--text);border-color:#7c5cff44;}

  /* No tokens */
  .no-tokens{background:#ff4f6a10;border:1px solid #ff4f6a33;border-radius:16px;
    padding:18px;align-self:flex-start;max-width:300px;text-align:center;}
  .no-tokens-title{font-size:.88rem;font-weight:600;color:#ff4f6a;margin-bottom:5px;}
  .no-tokens-sub{font-size:.78rem;color:var(--muted);margin-bottom:13px;line-height:1.5;}
  .btn-topup{display:inline-flex;align-items:center;gap:5px;
    background:var(--accent);color:#fff;border:none;border-radius:10px;
    padding:10px 18px;font-family:inherit;font-size:.83rem;font-weight:600;
    cursor:pointer;text-decoration:none;}

  /* Input area */
  .input-area{
    padding:10px 14px 14px;border-top:1px solid var(--border);
    display:flex;flex-direction:column;gap:8px;background:var(--bg);
  }

  /* Photos preview above input */
  .input-photos{display:flex;flex-wrap:wrap;gap:6px;padding:0 2px;}
  .input-photo-wrap{position:relative;}
  .input-photo-thumb{width:56px;height:56px;border-radius:9px;object-fit:cover;border:2px solid var(--accent);display:block;}
  .remove-photo{position:absolute;top:-6px;right:-6px;width:18px;height:18px;
    background:#ff4f6a;border:none;border-radius:50%;color:#fff;font-size:.7rem;
    cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}

  .input-row{display:flex;gap:8px;align-items:flex-end;}
  .text-inp{
    flex:1;background:#111118;border:1px solid var(--border);
    border-radius:22px;padding:10px 16px;color:var(--text);
    font-family:inherit;font-size:.88rem;outline:none;transition:border-color .2s;
    resize:none;max-height:120px;line-height:1.5;
  }
  .text-inp:focus{border-color:#7c5cff55;}
  .text-inp::placeholder{color:#3a3a4a;}

  .photo-btn{
    background:#1a1a2a;border:1px solid var(--border);color:var(--muted);
    border-radius:50%;width:40px;height:40px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:all .2s;
  }
  .photo-btn:hover{border-color:var(--accent);color:var(--accent);}
  .photo-btn.has-photos{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}

  .send-btn{
    background:var(--accent);border:none;border-radius:50%;
    width:40px;height:40px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:opacity .15s;
  }
  .send-btn:hover{opacity:.85;}
  .send-btn:disabled{opacity:.35;cursor:not-allowed;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">lendings<span>.kz</span></div>
  <div class="top-right">
    <div class="token-badge" id="tokenBadge">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14.93V18h-2v-1.07A4 4 0 018 13h2a2 2 0 104 0 4 4 0 01-3-3.87V8h2v1.13A4 4 0 0116 13a4 4 0 01-3 3.93z"/></svg>
      {{ user.tokens }} токенов
    </div>
    <a href="/dashboard" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Дашборд
    </a>
  </div>
</div>

<div class="chat-wrap">
  <div class="chat-area" id="chat"></div>

  <div class="input-area">
    <div class="input-photos" id="inputPhotos"></div>
    <div class="input-row">
      <label class="photo-btn" id="photoBtnLabel" title="Добавить фото">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <input type="file" accept="image/*" multiple id="photoInput" style="display:none" onchange="handlePhotos(this)">
      </label>
      <textarea id="inp" class="text-inp" placeholder="Напишите сообщение…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
let history = [];
let photoUrls = [];
let userTokens = {{ user.tokens }};
let inputLocked = false;
let editMode = false;   // after generation — chat becomes edit requests
let currentSlug = null;
// Accumulated chat token counters (sent back each turn for server-side tracking)
let chatIn = 0, chatOut = 0, chatCr = 0;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Render helpers ──────────────────────────────────────────────────────────
function addMsg(text, who) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${who}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

let doneCardEl = null;

function showDone(siteUrl, reply) {
  const chat = document.getElementById('chat');
  const slug = siteUrl.split('/').pop();

  if (!doneCardEl) {
    doneCardEl = document.createElement('div');
    doneCardEl.className = 'done-card';
    chat.appendChild(doneCardEl);
  }

  const fullUrl = window.location.origin + siteUrl;
  navigator.clipboard?.writeText(fullUrl).catch(()=>{});

  doneCardEl.innerHTML = `
    <div class="done-title">✅ ${reply}</div>
    <div class="done-sub">Ссылка скопирована. Можешь попросить что-то изменить прямо здесь.</div>
    <div class="done-actions">
      <a href="${siteUrl}" target="_blank" class="btn-open" id="siteOpenBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
        Открыть сайт
      </a>
      <a href="/dashboard?new=${siteUrl}" class="btn-dash">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Все мои сайты
      </a>
    </div>
  `;
  chat.scrollTop = chat.scrollHeight;

  // Switch to edit mode
  currentSlug = slug;
  editMode = true;
  const inp = document.getElementById('inp');
  const btn = document.getElementById('sendBtn');
  inp.disabled = false;
  btn.disabled = false;
  inp.placeholder = 'Что изменить? Например: поменяй цвет на тёмный, добавь Instagram…';
  inp.focus();
  document.getElementById('photoBtnLabel').style.pointerEvents = '';
  document.getElementById('photoBtnLabel').style.opacity = '';
}

function showNoTokens() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'no-tokens';
  div.innerHTML = `
    <div class="no-tokens-title">Недостаточно токенов</div>
    <div class="no-tokens-sub">Пополните баланс — и сайт будет готов за минуту.</div>
    <a href="/payment" class="btn-topup">Пополнить баланс →</a>
  `;
  chat.appendChild(div);
  lockInput();
}

function lockInput() {
  inputLocked = true;
  document.getElementById('inp').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('photoBtnLabel').style.pointerEvents = 'none';
  document.getElementById('photoBtnLabel').style.opacity = '.4';
}

// ── Photos ──────────────────────────────────────────────────────────────────
async function handlePhotos(input) {
  const files = Array.from(input.files);
  for (const file of files) {
    // Show loading placeholder
    const wrap = document.createElement('div');
    wrap.className = 'input-photo-wrap';
    wrap.innerHTML = '<div class="input-photo-thumb" style="background:#1a1a2a;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>';
    document.getElementById('inputPhotos').appendChild(wrap);

    const fd = new FormData();
    fd.append('file', file);
    const r = await fetch('/upload-photo', {method:'POST', body:fd});
    const j = await r.json();
    photoUrls.push(j.url);

    const img = document.createElement('img');
    img.className = 'input-photo-thumb';
    img.src = j.url;
    const btn = document.createElement('button');
    btn.className = 'remove-photo';
    btn.innerHTML = '✕';
    const idx = photoUrls.length - 1;
    btn.onclick = () => { photoUrls.splice(idx, 1); wrap.remove(); updatePhotoBtnStyle(); };
    wrap.innerHTML = '';
    wrap.appendChild(img);
    wrap.appendChild(btn);
    updatePhotoBtnStyle();
  }
  input.value = '';
}

function updatePhotoBtnStyle() {
  const btn = document.getElementById('photoBtnLabel');
  btn.classList.toggle('has-photos', photoUrls.length > 0);
}

// ── Send ────────────────────────────────────────────────────────────────────
async function send() {
  if (inputLocked) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  addMsg(text, 'user');

  if (photoUrls.length > 0 && !editMode) {
    const chat = document.getElementById('chat');
    const row = document.createElement('div');
    row.className = 'photos-row';
    photoUrls.forEach(url => {
      const img = document.createElement('img');
      img.className = 'photo-thumb'; img.src = url;
      row.appendChild(img);
    });
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  showTyping();

  // ── Edit mode: send edit request ──────────────────────────────────────────
  if (editMode && currentSlug) {
    try {
      const r = await fetch(`/site/${currentSlug}/edit`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: text })
      });
      const j = await r.json();
      removeTyping();

      if (j.error) {
        if (j.error.includes('токен')) { showNoTokens(); }
        else { addMsg(j.error, 'bot'); }
        return;
      }

      userTokens = j.tokens_left ?? userTokens;
      updateTokenBadge();
      addMsg('Готово! Сайт обновлён ✨', 'bot');
      showDone(j.site_url, 'Сайт обновлён!');
      // Force-refresh the open link
      const openBtn = document.getElementById('siteOpenBtn');
      if (openBtn) openBtn.href = j.site_url + '?v=' + Date.now();
    } catch(e) {
      removeTyping();
      addMsg('Что-то пошло не так, попробуй ещё раз.', 'bot');
    }
    return;
  }

  // ── Onboarding mode: regular chat ────────────────────────────────────────
  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: text, history, photo_urls: photoUrls,
        chat_in: chatIn, chat_out: chatOut, chat_cr: chatCr
      })
    });
    const j = await r.json();
    removeTyping();

    if (j.error) {
      if (j.error.includes('токен')) { showNoTokens(); }
      else { addMsg(j.error, 'bot'); }
      return;
    }

    history = j.history;
    if (!j.done) {
      chatIn  = j.chat_in  ?? chatIn;
      chatOut = j.chat_out ?? chatOut;
      chatCr  = j.chat_cr  ?? chatCr;
    }

    if (j.done) {
      userTokens = j.tokens_left ?? userTokens;
      updateTokenBadge();
      showDone(j.site_url, j.message);
    } else {
      addMsg(j.message, 'bot');
    }
  } catch(e) {
    removeTyping();
    addMsg('Что-то пошло не так, попробуй ещё раз.', 'bot');
  }
}

function updateTokenBadge() {
  document.getElementById('tokenBadge').innerHTML = `
    <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14.93V18h-2v-1.07A4 4 0 018 13h2a2 2 0 104 0 4 4 0 01-3-3.87V8h2v1.13A4 4 0 0116 13a4 4 0 01-3 3.93z"/></svg>
    ${userTokens} токенов`;
}

// ── Init ────────────────────────────────────────────────────────────────────
(async function() {
  {% if edit_site %}
  // Edit mode: resume with existing site
  currentSlug = '{{ edit_site.slug }}';
  editMode = true;
  const siteUrl = '/site/' + currentSlug;
  addMsg('Сайт «{{ edit_site.title }}» загружен. Что хочешь изменить?', 'bot');
  // Show done card so user sees the site link and edit input
  showDone(siteUrl, 'Продолжаем редактирование');
  {% else %}
  const r = await fetch('/start');
  const j = await r.json();
  addMsg(j.message, 'bot');
  {% endif %}
  document.getElementById('inp').focus();
})();
</script>
</body>
</html>

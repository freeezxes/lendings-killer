<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0D0D0D; --card:#141414; --line:#252525;
  --accent:#E8FF47; --text:#E5E5E5; --muted:#888;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;font-weight:300;overflow-x:hidden;}

.hero{min-height:100svh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 24px 52px;position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#1a1a1a 0%,var(--bg) 60%);}
.photo-block{position:absolute;top:0;right:0;width:62%;height:72%;background:linear-gradient(180deg,#2a2a2a,var(--bg));clip-path:polygon(0 0,100% 0,100% 100%,15% 100%);display:grid;place-items:center;font-size:5rem;}
.hero-label{position:relative;z-index:1;font-size:.6rem;letter-spacing:.45em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;animation:fadeIn .7s ease both .3s;}
.hero h1{position:relative;z-index:1;font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,16vw,7.5rem);line-height:.95;color:#fff;animation:fadeIn .7s ease both .45s;}
.hero h1 em{color:var(--accent);font-style:normal;}
.hero-city{position:relative;z-index:1;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:18px;animation:fadeIn .7s ease both .6s;}

.services{padding:60px 24px;}
.sec-label{display:flex;align-items:center;gap:12px;font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;color:var(--accent);margin-bottom:32px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--line);}
.svc-row{display:grid;grid-template-columns:1fr auto;align-items:center;padding:16px 0;border-bottom:1px solid var(--line);gap:12px;}
.svc-row:last-child{border-bottom:none;}
.svc-n{font-size:.9rem;font-weight:400;}
.svc-idx{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--line);line-height:1;}

.cta{padding:50px 24px 80px;}
.cta h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,12vw,5rem);line-height:1;margin-bottom:24px;}
.cta h2 span{color:var(--accent);}
.wa-btn{display:inline-flex;align-items:center;gap:12px;background:var(--accent);color:#0D0D0D;text-decoration:none;padding:16px 30px;border-radius:4px;font-family:'Manrope',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.04em;transition:all .25s;}
.wa-btn:hover{background:#fff;transform:translateX(4px);}
.wa-btn svg{width:19px;height:19px;fill:#0D0D0D;flex-shrink:0;}

footer{border-top:1px solid var(--line);text-align:center;padding:18px;font-size:.65rem;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;}

@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<section class="hero">
  <div class="hero-bg"></div>
  <div class="photo-block">✂️</div>
  <div class="hero-label">{{ profession or 'мастер своего дела' }}</div>
  <h1>{{ name }}</h1>
  <div class="hero-city">{{ hero_text or city }}</div>
</section>

<section class="services">
  <div class="sec-label">что я делаю</div>
  {% for line in services_raw.splitlines() %}{% if line.strip() %}
  <div class="svc-row">
    <span class="svc-n">{{ line.strip() }}</span>
    <span class="svc-idx">0{{ loop.index }}</span>
  </div>
  {% endif %}{% endfor %}
</section>

<section class="cta">
  <h2>Запишись<br><span>сейчас</span></h2>
  <a href="{% if whatsapp %}https://wa.me/{{ whatsapp }}{% else %}#{% endif %}" class="wa-btn" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    {{ cta_text or 'Написать в WhatsApp' }}
  </a>
</section>

<footer>lendings.kz</footer>
</body>
</html>

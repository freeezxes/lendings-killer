<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — lendings.kz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg:#080810; --surface:#0f0f18; --surface2:#14141e; --border:#1c1c2c;
    --accent:#7c5cff; --accent-glow:#7c5cff28;
    --text:#e8e4ff; --muted:#5e5e7a; --muted2:#3a3a55;
    --green:#34d896; --yellow:#f5c842; --blue:#4fa3ff; --red:#ff5f7e;
    --mono:'JetBrains Mono',monospace; --radius:14px;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Sora',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 50% 25% at 15% 0%,#7c5cff12 0%,transparent 55%),
               radial-gradient(ellipse 35% 20% at 85% 100%,#4fa3ff08 0%,transparent 55%);}

  /* Header */
  .header{position:sticky;top:0;z-index:100;background:#080810ee;backdrop-filter:blur(24px);
    border-bottom:1px solid var(--border);padding:0 20px;height:56px;
    display:flex;align-items:center;justify-content:space-between;}
  .header-left{display:flex;align-items:center;gap:12px;}
  .logo{font-size:1rem;font-weight:700;letter-spacing:-.02em;}
  .logo span{color:var(--accent);}
  .admin-badge{background:#ff5f7e18;border:1px solid #ff5f7e33;color:var(--red);
    border-radius:6px;padding:3px 8px;font-size:.68rem;font-weight:600;
    text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);
    animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  .live-label{font-size:.74rem;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:6px;}

  /* Content */
  .content{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:24px 20px 60px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  /* Stats grid */
  .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
  @media(min-width:640px){.stats-grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:900px){.stats-grid{grid-template-columns:repeat(6,1fr);}}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 14px;position:relative;overflow:hidden;animation:fadeUp .4s both;}
  .stat-card:nth-child(1){animation-delay:.04s} .stat-card:nth-child(2){animation-delay:.08s}
  .stat-card:nth-child(3){animation-delay:.12s} .stat-card:nth-child(4){animation-delay:.16s}
  .stat-card:nth-child(5){animation-delay:.20s} .stat-card:nth-child(6){animation-delay:.24s}
  .stat-label{font-size:.68rem;font-weight:500;text-transform:uppercase;letter-spacing:.07em;
    color:var(--muted);margin-bottom:8px;}
  .stat-value{font-size:1.55rem;font-weight:700;letter-spacing:-.03em;line-height:1;
    font-family:var(--mono);transition:all .3s;}
  .stat-value.accent{color:var(--accent)} .stat-value.green{color:var(--green)}
  .stat-value.yellow{color:var(--yellow)} .stat-value.blue{color:var(--blue)}
  .stat-value.red{color:var(--red)} .stat-value.white{color:var(--text)}
  .stat-sub{font-size:.68rem;color:var(--muted);margin-top:4px;font-family:var(--mono);}

  /* Tabs */
  .tabs{display:flex;gap:4px;margin-bottom:18px;animation:fadeUp .4s .2s both;}
  .tab-btn{background:none;border:1px solid var(--border);color:var(--muted);
    border-radius:9px;padding:7px 16px;font-family:inherit;font-size:.82rem;
    cursor:pointer;transition:all .2s;}
  .tab-btn:hover{color:var(--text);border-color:var(--muted2);}
  .tab-btn.active{background:var(--accent-glow);border-color:#7c5cff44;color:var(--accent);}

  /* Panel */
  .panel{display:none;} .panel.active{display:block;}

  /* Table */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;animation:fadeUp .4s .25s both;}
  .table-scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:.82rem;}
  thead th{background:var(--surface2);padding:10px 14px;text-align:left;
    font-size:.67rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;
    color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;font-family:var(--mono);}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#ffffff05;}
  tbody td{padding:11px 14px;vertical-align:middle;white-space:nowrap;}
  td.mono{font-family:var(--mono);font-size:.78rem;color:var(--muted);}
  td.ellipsis{max-width:180px;overflow:hidden;text-overflow:ellipsis;}

  .badge{display:inline-block;border-radius:6px;padding:2px 7px;font-size:.7rem;
    font-weight:600;font-family:var(--mono);}
  .badge-purple{background:var(--accent-glow);border:1px solid #7c5cff33;color:var(--accent);}
  .badge-green{background:#34d89620;border:1px solid #34d89633;color:var(--green);}
  .badge-yellow{background:#f5c84220;border:1px solid #f5c84233;color:var(--yellow);}
  .badge-red{background:#ff5f7e18;border:1px solid #ff5f7e33;color:var(--red);}

  .open-link{display:inline-flex;align-items:center;gap:4px;color:var(--accent);
    text-decoration:none;font-size:.76rem;transition:opacity .15s;}
  .open-link:hover{opacity:.7;}

  /* Loading/empty */
  .state-row td{text-align:center;padding:40px;color:var(--muted);font-size:.84rem;}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
    margin-right:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── USER DETAIL MODAL ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:#00000099;
    z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;
    width:100%;max-width:680px;margin:auto;animation:fadeUp .25s both;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;
    padding:18px 22px;border-bottom:1px solid var(--border);}
  .modal-title{font-size:.95rem;font-weight:700;letter-spacing:-.02em;}
  .modal-close{background:none;border:none;color:var(--muted);cursor:pointer;
    width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    transition:all .2s;font-size:1rem;}
  .modal-close:hover{background:var(--surface2);color:var(--text);}
  .modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:18px;}

  /* User hero */
  .user-hero{display:flex;align-items:center;gap:14px;}
  .user-avatar{width:44px;height:44px;border-radius:13px;background:var(--accent-glow);
    border:2px solid #7c5cff33;display:flex;align-items:center;justify-content:center;
    font-size:1.1rem;font-weight:700;color:var(--accent);flex-shrink:0;}
  .user-name{font-size:.95rem;font-weight:600;margin-bottom:2px;}
  .user-meta{font-size:.74rem;color:var(--muted);font-family:var(--mono);}

  /* Stats row */
  .user-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .user-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:10px 12px;text-align:center;}
  .user-stat-val{font-size:1rem;font-weight:700;font-family:var(--mono);letter-spacing:-.02em;}
  .user-stat-lbl{font-size:.64rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}

  /* Add tokens */
  .add-tokens-form{display:flex;gap:8px;align-items:center;}
  .add-tokens-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);
    border-radius:9px;padding:8px 12px;font-family:var(--mono);font-size:.88rem;
    width:100px;outline:none;transition:border-color .2s;}
  .add-tokens-input:focus{border-color:var(--accent);}
  .add-tokens-btn{background:var(--accent);color:#fff;border:none;border-radius:9px;
    padding:8px 14px;font-family:inherit;font-size:.8rem;font-weight:600;
    cursor:pointer;transition:opacity .15s;white-space:nowrap;}
  .add-tokens-btn:hover{opacity:.88;}
  .add-tokens-result{font-size:.78rem;color:var(--green);font-family:var(--mono);}

  /* Sub-section */
  .sub-title{font-size:.68rem;font-weight:600;text-transform:uppercase;
    letter-spacing:.08em;color:var(--muted);margin-bottom:10px;
    display:flex;align-items:center;gap:8px;}
  .sub-title::after{content:'';flex:1;height:1px;background:var(--border);}

  /* Site cards */
  .site-cards{display:flex;flex-direction:column;gap:8px;}
  .site-card-m{background:var(--surface2);border:1px solid var(--border);border-radius:12px;
    padding:12px 14px;transition:border-color .2s;}
  .site-card-m:hover{border-color:#7c5cff33;}
  .site-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .site-card-title{font-size:.84rem;font-weight:600;line-height:1.3;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px;}
  .site-card-date{font-size:.7rem;color:var(--muted);font-family:var(--mono);flex-shrink:0;}
  .site-card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  /* Token breakdown bars */
  .tok-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .tok-row{background:#ffffff05;border-radius:7px;padding:6px 10px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .tok-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);white-space:nowrap;}
  .tok-val{font-size:.76rem;font-weight:600;font-family:var(--mono);}
  .tok-in{color:var(--blue);}
  .tok-out{color:var(--accent);}
  .tok-cache{color:var(--green);}
  .tok-cost{color:var(--yellow);}
  .tok-platform{color:#e8e4ff;}
  .site-open-link{display:inline-flex;align-items:center;gap:4px;font-size:.74rem;
    color:var(--accent);text-decoration:none;transition:opacity .15s;}
  .site-open-link:hover{opacity:.7;}

  /* Log timeline */
  .log-list{display:flex;flex-direction:column;gap:1px;}
  .log-row{display:flex;align-items:center;gap:10px;padding:8px 10px;
    background:var(--surface2);border-radius:0;}
  .log-row:first-child{border-radius:9px 9px 0 0;}
  .log-row:last-child{border-radius:0 0 9px 9px;}
  .log-row:only-child{border-radius:9px;}
  .log-delta{font-size:.84rem;font-weight:700;font-family:var(--mono);width:36px;flex-shrink:0;text-align:right;}
  .log-plus{color:var(--green);} .log-minus{color:var(--red);}
  .log-reason{font-size:.78rem;color:var(--text);flex:1;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .log-sub{font-size:.68rem;color:var(--muted);font-family:var(--mono);white-space:nowrap;}
  .log-date{font-size:.68rem;color:var(--muted2);font-family:var(--mono);flex-shrink:0;}

  /* Payments */
  .pay-list{display:flex;flex-direction:column;gap:1px;}
  .pay-row{display:flex;align-items:center;gap:10px;padding:8px 10px;
    background:var(--surface2);}
  .pay-row:first-child{border-radius:9px 9px 0 0;}
  .pay-row:last-child{border-radius:0 0 9px 9px;}
  .pay-row:only-child{border-radius:9px;}
  .pay-amount{font-size:.88rem;font-weight:700;font-family:var(--mono);flex-shrink:0;}
  .pay-info{flex:1;font-size:.74rem;color:var(--muted);}
  .pay-date{font-size:.68rem;color:var(--muted2);font-family:var(--mono);flex-shrink:0;}

  .empty-sub{font-size:.78rem;color:var(--muted);text-align:center;padding:20px;
    background:var(--surface2);border-radius:9px;}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">lendings<span>.kz</span></div>
    <span class="admin-badge">Admin</span>
  </div>
  <div class="live-label">
    <div class="live-dot"></div>
    <span id="liveTs">—</span>
  </div>
</header>

<main class="content">

  <!-- stats -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Юзеры</div><div class="stat-value accent" id="s-users">—</div><div class="stat-sub">всего</div></div>
    <div class="stat-card"><div class="stat-label">Сайты</div><div class="stat-value green" id="s-sites">—</div><div class="stat-sub">сгенерировано</div></div>
    <div class="stat-card"><div class="stat-label">Платежи</div><div class="stat-value yellow" id="s-paid-count">—</div><div class="stat-sub">успешных</div></div>
    <div class="stat-card"><div class="stat-label">Выручка</div><div class="stat-value white" id="s-paid-sum">—</div><div class="stat-sub">₸ оплачено</div></div>
    <div class="stat-card"><div class="stat-label">AI стоимость</div><div class="stat-value red" id="s-cost">—</div><div class="stat-sub">USD Claude</div></div>
    <div class="stat-card"><div class="stat-label">AI tokens</div><div class="stat-value blue" id="s-tokens">—</div><div class="stat-sub">Claude usage</div></div>
  </div>

  <!-- tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('users')">Пользователи</button>
    <button class="tab-btn" onclick="switchTab('sites')">Последние сайты</button>
  </div>

  <!-- users panel -->
  <div class="panel active" id="panel-users">
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>#</th><th>Телефон</th><th>Имя</th><th>Dev</th>
            <th>Сайты</th><th>Оплатил</th><th>Дата рег.</th>
          </tr></thead>
          <tbody id="users-tbody"><tr class="state-row"><td colspan="7"><span class="spinner"></span>Загрузка…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- sites panel -->
  <div class="panel" id="panel-sites">
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Телефон</th><th>Имя</th><th>Сайт</th><th>Dev</th><th>Дата</th><th></th>
          </tr></thead>
          <tbody id="sites-tbody"><tr class="state-row"><td colspan="6"><span class="spinner"></span>Загрузка…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<!-- user detail modal -->
<div class="modal-overlay" id="userModal" onclick="closeModalOutside(event)">
  <div class="modal" id="modalContent">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Пользователь</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div style="text-align:center;padding:40px;color:var(--muted)"><span class="spinner"></span>Загрузка…</div>
    </div>
  </div>
</div>

<script>
const esc = s => { const d = document.createElement('div'); d.textContent = s??''; return d.innerHTML; };
const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : String(n??0);
const identity = u => u?.phone || u?.email || '—';

function setVal(id, v) {
  const el = document.getElementById(id);
  if (el && el.textContent !== String(v)) el.textContent = v;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['users','sites'][i] === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── Stats ──
async function loadStats() {
  const r = await fetch('/admin/api/stats', {cache:'no-store'});
  const d = await r.json();
  setVal('s-users', d.users ?? '—');
  setVal('s-sites', d.sites ?? '—');
  setVal('s-paid-count', d.paid_count ?? 0);
  setVal('s-paid-sum', (d.paid_sum ?? 0).toLocaleString('ru') + ' ₸');
  setVal('s-cost', d.total_cost != null ? '$' + Number(d.total_cost).toFixed(4) : '—');
  setVal('s-tokens', fmt(d.total_tokens));

  // recent sites
  const tbody = document.getElementById('sites-tbody');
  if (!d.recent_sites?.length) {
    tbody.innerHTML = '<tr class="state-row"><td colspan="6">Сайтов пока нет</td></tr>';
  } else {
    tbody.innerHTML = d.recent_sites.map(s => `
      <tr onclick="openUser(${s.user_id})">
        <td class="mono">${esc(s.phone || s.email || '—')}</td>
        <td>${esc(s.name||'—')}</td>
        <td class="ellipsis" title="${esc(s.title)}">${esc(s.title||'—')}</td>
        <td><span class="badge badge-purple">${esc(String(s.tokens_used??0))}</span></td>
        <td class="mono">${esc((s.created||'').slice(0,10))}</td>
        <td><a href="/site/${esc(s.slug)}" target="_blank" class="open-link" onclick="e=>e.stopPropagation()">
          Открыть <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
        </a></td>
      </tr>`).join('');
  }

  // ts
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('liveTs').textContent = `обновлено ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

// ── Users ──
async function loadUsers() {
  const r = await fetch('/admin/api/users', {cache:'no-store'});
  const users = await r.json();
  const tbody = document.getElementById('users-tbody');
  if (!users.length) {
    tbody.innerHTML = '<tr class="state-row"><td colspan="7">Юзеров нет</td></tr>';
    return;
  }
  tbody.innerHTML = users.map((u,i) => `
    <tr onclick="openUser(${u.id})">
      <td class="mono" style="color:var(--muted2)">${i+1}</td>
      <td class="mono">${esc(identity(u))}</td>
      <td>${esc(u.name||'—')}</td>
      <td><span class="badge badge-purple">${u.dev_credits ?? u.tokens}</span></td>
      <td><span class="badge badge-green">${u.sites_count}</span></td>
      <td>${u.paid_total > 0 ? `<span class="badge badge-yellow">${Number(u.paid_total).toLocaleString('ru')} ₸</span>` : '<span style="color:var(--muted2)">—</span>'}</td>
      <td class="mono">${esc((u.created||'').slice(0,10))}</td>
    </tr>`).join('');
}

// ── User detail modal ──
async function openUser(uid) {
  document.getElementById('userModal').classList.add('show');
  document.getElementById('modalBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)"><span class="spinner"></span>Загрузка…</div>';

  const r = await fetch(`/admin/api/user/${uid}`, {cache:'no-store'});
  const d = await r.json();
  const u = d.user;

  document.getElementById('modalTitle').textContent = u.name || identity(u);

  const paidTotal = d.payments.filter(p=>p.status==='paid').reduce((s,p)=>s+p.amount,0);
  const genCount  = d.token_log.filter(l=>l.delta<0).length;

  const fmtK  = n => n ? (n>=1000 ? (n/1000).toFixed(1)+'K' : String(n)) : '—';
  const fmtReason = r => {
    if (!r) return 'Начальные кредиты разработки';
    if (r.startsWith('site_generate:')) return 'Создание страницы';
    if (r.startsWith('kaspi_payment:')) return 'Пополнение Kaspi';
    if (r === 'admin_grant') return 'Начислено админом';
    return r;
  };

  // Site cards with token breakdown
  const sitesHtml = d.sites.length
    ? `<div class="site-cards">${d.sites.map(s => {
        const hasMetrics = s.chat_in || s.gen_in;
        return `
        <div class="site-card-m">
          <div class="site-card-top">
            <div class="site-card-title" title="${esc(s.title)}">${esc(s.title||s.slug)}</div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
              <span class="badge badge-purple">${s.tokens_used} dev</span>
              <a href="/site/${esc(s.slug)}" target="_blank" class="site-open-link">
                Открыть <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
              </a>
            </div>
          </div>
          ${hasMetrics ? `
          <div class="tok-grid">
            <div class="tok-row">
              <span class="tok-label">Чат</span>
              <span><span class="tok-val tok-in">${fmtK(s.chat_in)}</span> <span style="color:var(--muted2);font-size:.62rem">IN</span>
                    <span style="margin:0 3px;color:var(--muted2)">/</span>
                    <span class="tok-val tok-out">${fmtK(s.chat_out)}</span> <span style="color:var(--muted2);font-size:.62rem">OUT</span></span>
            </div>
            <div class="tok-row">
              <span class="tok-label">Генерация</span>
              <span><span class="tok-val tok-in">${fmtK(s.gen_in)}</span> <span style="color:var(--muted2);font-size:.62rem">IN</span>
                    <span style="margin:0 3px;color:var(--muted2)">/</span>
                    <span class="tok-val tok-out">${fmtK(s.gen_out)}</span> <span style="color:var(--muted2);font-size:.62rem">OUT</span></span>
            </div>
            <div class="tok-row">
              <span class="tok-label">Кэш (сэконом.)</span>
              <span class="tok-val tok-cache">${fmtK(s.cache_read)}</span>
            </div>
            <div class="tok-row">
              <span class="tok-label">Стоимость</span>
              <span class="tok-val tok-cost">${s.cost_usd ? '$'+Number(s.cost_usd).toFixed(4) : '—'}</span>
            </div>
          </div>` : '<div style="font-size:.72rem;color:var(--muted2);padding:2px 0">Метрики недоступны (старый сайт)</div>'}
          <div style="margin-top:8px;font-size:.68rem;color:var(--muted2);font-family:var(--mono)">${esc((s.created||'').slice(0,16).replace('T',' '))}</div>
        </div>`}).join('')}
      </div>`
    : '<div class="empty-sub">Сайтов нет</div>';

  // Token log as clean timeline
  const logHtml = d.token_log.length
    ? `<div class="log-list">${d.token_log.slice(0,15).map(l=>`
        <div class="log-row">
          <div class="log-delta ${l.delta>0?'log-plus':'log-minus'}">${l.delta>0?'+':''}${l.delta}</div>
          <div style="flex:1;min-width:0">
            <div class="log-reason">${esc(fmtReason(l.reason))}</div>
            ${l.claude_in||l.claude_out ? `<div style="font-size:.66rem;color:var(--muted);font-family:var(--mono);margin-top:1px">${fmtK(l.claude_in)} in · ${fmtK(l.claude_out)} out${l.cost_usd?' · <span style="color:var(--yellow)">$'+Number(l.cost_usd).toFixed(4)+'</span>':''}</div>` : ''}
          </div>
          <div class="log-date">${esc((l.ts||'').slice(0,10))}</div>
        </div>`).join('')}
      </div>`
    : '<div class="empty-sub">Операций нет</div>';

  // Payments
  const paymentsHtml = d.payments.length
    ? `<div class="pay-list">${d.payments.map(p=>{
        const creditInfo = p.payment_kind === 'promo_credits'
          ? `+${p.promo_credits||0} кредитов продвижения`
          : `+${p.dev_credits||p.tokens||0} кредитов разработки`;
        return `<div class="pay-row">
          <div class="pay-amount" style="color:${p.status==='paid'?'var(--green)':'var(--muted)'}">${Number(p.amount).toLocaleString('ru')} ₸</div>
          <div class="pay-info">${creditInfo} · <span style="color:${p.status==='paid'?'var(--green)':p.status==='pending'?'var(--yellow)':'var(--red)'}">${p.status}</span></div>
          <div class="pay-date">${esc((p.created||'').slice(0,10))}</div>
        </div>`}).join('')}
      </div>`
    : '<div class="empty-sub">Платежей нет</div>';

  document.getElementById('modalBody').innerHTML = `
    <div class="user-hero">
      <div class="user-avatar">${esc((u.name || identity(u)).slice(0,1).toUpperCase())}</div>
      <div>
        <div class="user-name">${esc(u.name||'Без имени')}</div>
        <div class="user-meta">${esc(identity(u))} · ID ${u.id} · с ${esc((u.created||'').slice(0,10))}</div>
      </div>
    </div>

    <div class="user-stats">
      <div class="user-stat">
        <div class="user-stat-val" style="color:var(--accent)">${u.dev_credits ?? u.tokens}</div>
        <div class="user-stat-lbl">Dev Credits</div>
      </div>
      <div class="user-stat">
        <div class="user-stat-val" style="color:var(--green)">${d.sites.length}</div>
        <div class="user-stat-lbl">сайтов</div>
      </div>
      <div class="user-stat">
        <div class="user-stat-val">${genCount}</div>
        <div class="user-stat-lbl">генераций</div>
      </div>
      <div class="user-stat">
        <div class="user-stat-val" style="color:var(--yellow)">${paidTotal>0?Number(paidTotal).toLocaleString('ru')+' ₸':'—'}</div>
        <div class="user-stat-lbl">оплатил</div>
      </div>
    </div>

    <div>
      <div class="sub-title">Начислить кредиты разработки</div>
      <div class="add-tokens-form">
        <input type="number" class="add-tokens-input" id="addAmt" placeholder="100" min="1" max="9999">
        <button class="add-tokens-btn" onclick="addTokens(${u.id})">+ Начислить</button>
        <span class="add-tokens-result" id="addResult"></span>
      </div>
    </div>

    <div>
      <div class="sub-title">Сайты · ${d.sites.length}</div>
      ${sitesHtml}
    </div>

    <div>
      <div class="sub-title">Платежи · ${d.payments.length}</div>
      ${paymentsHtml}
    </div>

    <div>
      <div class="sub-title">История кредитов разработки</div>
      ${logHtml}
    </div>
  `;
}

async function addTokens(uid) {
  const amt = parseInt(document.getElementById('addAmt').value);
  if (!amt || amt < 1) return;
  const r = await fetch(`/admin/api/user/${uid}/add-tokens`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({amount: amt})
  });
  const d = await r.json();
  if (d.ok) {
    document.getElementById('addResult').textContent = `✓ баланс: ${d.dev_credits ?? d.tokens}`;
    loadUsers(); loadStats();
  }
}

function closeModal() { document.getElementById('userModal').classList.remove('show'); }
function closeModalOutside(e) { if (e.target === document.getElementById('userModal')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
(async function() {
  await Promise.all([loadStats(), loadUsers()]);
  setInterval(() => { loadStats(); loadUsers(); }, 30000);
})();
</script>
</body>
</html>
